<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Briefing</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeedea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #8f8e89;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --blue-bg: #e6f1fb; --blue: #185fa5; --blue-border: #85b7eb;
    --red: #e24b4a; --teal: #1d9e75; --amber: #ba7517;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
      --text: #e8e6e0; --text2: #a0a09a; --text3: #6a6a64;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue-bg: #0c2a44; --blue: #85b7eb; --blue-border: #185fa5;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  /* TOP BAR */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 14px; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
  .logo { font-size: 15px; font-weight: 500; }
  .date-nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn { background: var(--bg); border: 0.5px solid var(--border2); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: var(--text2); }
  .nav-btn:hover { background: var(--bg3); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .date-label { font-size: 12px; font-weight: 500; color: var(--text); min-width: 80px; text-align: center; }

  /* LANG TOGGLE */
  .lang-toggle { display: flex; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; border: 0.5px solid var(--border); width: fit-content; margin-bottom: 14px; }
  .lang-btn { font-size: 12px; font-weight: 500; padding: 5px 16px; border-radius: 6px; cursor: pointer; color: var(--text2); border: none; background: none; }
  .lang-btn.active { background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); }

  /* CARDS */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

  /* AUDIO */
  .audio-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .audio-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .player { display: flex; align-items: center; gap: 10px; }
  .play-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--text); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .play-icon { width: 0; height: 0; border: solid transparent; border-width: 6px 0 6px 11px; border-left-color: var(--bg); margin-left: 2px; }
  .pause-icon { display: flex; gap: 3px; }
  .pause-bar { width: 3px; height: 11px; background: var(--bg); border-radius: 1px; }
  .progress-wrap { flex: 1; cursor: pointer; }
  .progress-track { height: 3px; background: var(--border2); border-radius: 2px; position: relative; }
  .progress-fill { height: 100%; background: var(--text); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
  .time-row { display: flex; justify-content: space-between; margin-top: 4px; }
  .time-label { font-size: 10px; color: var(--text3); }
  .speed-btn { font-size: 11px; font-weight: 500; color: var(--text2); border: 0.5px solid var(--border2); border-radius: 6px; padding: 5px 9px; background: none; cursor: pointer; }
  .speed-btn:hover { background: var(--bg2); }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .metric { background: var(--bg2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .metric-val { font-size: 20px; font-weight: 500; }
  .metric-lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* NEWS ITEMS */
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
  .news-item { display: flex; gap: 9px; padding: 9px 0; border-top: 0.5px solid var(--border); align-items: flex-start; cursor: pointer; text-decoration: none; }
  .news-item:hover .item-title { color: var(--blue); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .d-red { background: var(--red); }
  .d-blue { background: #378add; }
  .d-teal { background: var(--teal); }
  .d-amber { background: var(--amber); }
  .d-gray { background: var(--text3); }
  .item-body { flex: 1; }
  .item-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; transition: color 0.15s; }
  .item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .item-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .item-link-icon { font-size: 11px; color: var(--text3); flex-shrink: 0; margin-top: 4px; }

  /* INSTITUTION TABS */
  .inst-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  .inst-header { padding: 14px 16px 0; }
  .inst-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .inst-tabs::-webkit-scrollbar { display: none; }
  .inst-tab { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text2); white-space: nowrap; cursor: pointer; background: none; flex-shrink: 0; }
  .inst-tab.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
  .inst-divider { height: 0.5px; background: var(--border); }
  .inst-body { padding: 14px 16px; }
  .inst-summary { font-size: 12px; color: var(--text2); line-height: 1.65; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); }

  /* MINI AUDIO */
  .mini-player { display: flex; align-items: center; gap: 8px; background: var(--bg2); border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 12px; }
  .mini-play-btn { width: 26px; height: 26px; border-radius: 50%; background: var(--text); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .mini-play-icon { width: 0; height: 0; border: solid transparent; border-width: 4px 0 4px 8px; border-left-color: var(--bg); margin-left: 1px; }
  .mini-label { font-size: 11px; color: var(--text2); flex: 1; }
  .gen-btn { font-size: 11px; font-weight: 500; color: var(--blue); border: 0.5px solid var(--blue-border); background: var(--blue-bg); border-radius: 6px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
  .gen-btn:disabled { opacity: 0.5; cursor: default; }

  /* TOPIC CLUSTER */
  .cluster { margin-bottom: 14px; }
  .cluster-title { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .cluster-count { background: var(--bg2); border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--text3); }

  /* LOADING / EMPTY */
  .loading { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
  .empty { text-align: center; padding: 20px; color: var(--text3); font-size: 12px; }

  /* SUMMARY TEXT */
  .summary-text { font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="logo">Industry Briefing</div>
    <div class="date-nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">←</button>
      <div class="date-label" id="date-label">Loading...</div>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)" disabled>→</button>
    </div>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">English</button>
    <button class="lang-btn" id="lang-ko" onclick="setLang('ko')">한국어</button>
  </div>

  <div id="main-content"><div class="loading">Loading briefing...</div></div>

</div>

<script>
const BASE = location.hostname === 'localhost' ? '.' : '.';
let dates = [];
let currentIdx = 0;
let currentData = null;
let lang = 'en';
let audioEl = null;
let speeds = [1, 1.5, 2];
let speedIdx = 0;

async function init() {
  try {
    const res = await fetch(`${BASE}/data/index.json`);
    const idx = await res.json();
    dates = idx.dates || [];
    if (dates.length === 0) {
      document.getElementById('main-content').innerHTML = '<div class="loading">No briefings yet. Run the workflow first.</div>';
      return;
    }
    currentIdx = 0;
    loadDate(dates[0]);
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">No data found. Run the GitHub Actions workflow first.</div>';
  }
}

async function loadDate(date) {
  document.getElementById('date-label').textContent = formatDate(date);
  document.getElementById('prev-btn').disabled = (currentIdx >= dates.length - 1);
  document.getElementById('next-btn').disabled = (currentIdx <= 0);
  document.getElementById('main-content').innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch(`${BASE}/data/${date}.json`);
    currentData = await res.json();
    render();
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Failed to load data for ' + date + '</div>';
  }
}

function navigate(dir) {
  currentIdx += dir;
  if (currentIdx < 0) currentIdx = 0;
  if (currentIdx >= dates.length) currentIdx = dates.length - 1;
  loadDate(dates[currentIdx]);
}

function setLang(l) {
  lang = l;
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.getElementById('lang-ko').classList.toggle('active', l === 'ko');
  if (currentData) render();
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const today = new Date().toISOString().slice(0,10);
  if (d === today) return 'Today';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getDotClass(title) {
  const t = (title || '').toLowerCase();
  if (t.includes('osfi') || t.includes('regulation') || t.includes('regulator') || t.includes('fine') || t.includes('penalty')) return 'd-red';
  if (t.includes('rbc') || t.includes('td ') || t.includes('bmo') || t.includes('scotiabank')) return 'd-blue';
  if (t.includes('fintech') || t.includes('wealthsimple') || t.includes('koho') || t.includes('open banking')) return 'd-teal';
  return 'd-gray';
}

function render() {
  const d = currentData;
  const s = d.summary || {};

  let html = '';

  // ── Audio player
  html += `<div class="card">
    <div class="audio-label">Today's podcast</div>
    <div class="audio-title">${lang === 'en' ? 'Morning briefing' : '모닝 브리핑'} — ${formatDate(d.date)}</div>
    <div class="player">
      <button class="play-btn" id="main-play" onclick="togglePlay()">
        <div class="play-icon" id="play-icon"></div>
      </button>
      <div class="progress-wrap" onclick="seekAudio(event)">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="time-row">
          <span class="time-label" id="time-current">0:00</span>
          <span class="time-label" id="time-total">${d.audio_duration || '30:00'}</span>
        </div>
      </div>
      <button class="speed-btn" id="speed-btn" onclick="cycleSpeed()">1x</button>
    </div>
  </div>`;

  // ── Daily summary
  const urgentLabel = lang === 'en' ? 'Urgent' : '긴급';
  const articlesLabel = lang === 'en' ? 'Articles' : '기사';
  const institutionsLabel = lang === 'en' ? 'Sources' : '기관';
  const summaryTitle = lang === 'en' ? "Today's summary" : '오늘의 요약';

  html += `<div class="card">
    <div class="section-title">${summaryTitle}</div>
    <div class="metrics">
      <div class="metric"><div class="metric-val">${d.total_articles || 0}</div><div class="metric-lbl">${articlesLabel}</div></div>
      <div class="metric"><div class="metric-val">${d.urgent_count || 0}</div><div class="metric-lbl">${urgentLabel}</div></div>
      <div class="metric"><div class="metric-val">${(d.institutions || []).filter(i => i.count > 0).length}</div><div class="metric-lbl">${institutionsLabel}</div></div>
    </div>
    <div class="summary-text">${(s[lang] || s.en || '').trim()}</div>
  </div>`;

  // ── Institution tabs
  const insts = d.institutions || [];
  if (insts.length > 0) {
    const byInstLabel = lang === 'en' ? 'By institution' : '기관별';
    html += `<div class="inst-card">
      <div class="inst-header">
        <div class="section-title">${byInstLabel}</div>
        <div class="inst-tabs" id="inst-tabs">`;

    insts.forEach((inst, i) => {
      html += `<button class="inst-tab${i===0?' active':''}" onclick="showInst(${i})" id="inst-tab-${i}">${inst.name}${inst.count > 0 ? ` (${inst.count})` : ''}</button>`;
    });

    html += `</div></div><div class="inst-divider"></div><div class="inst-body" id="inst-body">`;
    html += renderInst(insts[0], 0);
    html += `</div></div>`;
  }

  document.getElementById('main-content').innerHTML = html;
  initAudio(d);
}

function renderInst(inst, idx) {
  if (!inst) return '';
  const noNews = lang === 'en' ? 'No recent news.' : '최근 뉴스가 없습니다.';
  const summary = inst.summary?.[lang] || inst.summary?.en || noNews;
  const generateLabel = lang === 'en' ? 'Generate audio' : '오디오 생성';
  const audioLabel = lang === 'en' ? `${inst.name} summary · ~3 min` : `${inst.name} 요약 · 약 3분`;

  let html = `
    <div class="inst-summary">${summary}</div>
    <div class="mini-player" id="mini-player-${idx}">
      <button class="mini-play-btn" id="mini-play-${idx}" onclick="toggleMiniPlay(${idx})" style="display:none">
        <div class="mini-play-icon"></div>
      </button>
      <div class="mini-label" id="mini-label-${idx}">${audioLabel}</div>
      <button class="gen-btn" id="gen-btn-${idx}" onclick="generateInstAudio(${idx})">${generateLabel}</button>
    </div>`;

  const clusters = inst.clusters || [];
  if (clusters.length === 0) {
    html += `<div class="empty">${noNews}</div>`;
  } else {
    clusters.forEach(cluster => {
      html += `<div class="cluster">
        <div class="cluster-title">${cluster.topic}<span class="cluster-count">${cluster.articles.length}</span></div>`;
      cluster.articles.forEach(article => {
        const dot = getDotClass(article.title);
        const sub = article.summary || '';
        const meta = [article.source, article.published].filter(Boolean).join(' · ');
        html += `<a class="news-item" href="${article.url || '#'}" target="_blank" rel="noopener">
          <div class="dot ${dot}"></div>
          <div class="item-body">
            <div class="item-title">${article.title}</div>
            ${sub ? `<div class="item-sub">${sub}</div>` : ''}
            ${meta ? `<div class="item-meta">${meta}</div>` : ''}
          </div>
          <div class="item-link-icon">↗</div>
        </a>`;
      });
      html += `</div>`;
    });
  }

  return html;
}

function showInst(idx) {
  const insts = currentData?.institutions || [];
  document.querySelectorAll('.inst-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('inst-body').innerHTML = renderInst(insts[idx], idx);
}

// ── Main audio player
function initAudio(d) {
  if (audioEl) { audioEl.pause(); audioEl = null; }
  if (!d.audio_url) return;

  audioEl = new Audio(`${BASE}/${d.audio_url}`);
  audioEl.ontimeupdate = updateProgress;
  audioEl.onended = () => {
    document.getElementById('play-icon').className = 'play-icon';
  };
}

function togglePlay() {
  if (!audioEl) return;
  if (audioEl.paused) {
    audioEl.play();
    document.getElementById('play-icon').outerHTML = '<div class="pause-icon" id="play-icon"><div class="pause-bar"></div><div class="pause-bar"></div></div>';
  } else {
    audioEl.pause();
    document.getElementById('play-icon').outerHTML = '<div class="play-icon" id="play-icon"></div>';
  }
}

function updateProgress() {
  if (!audioEl || !audioEl.duration) return;
  const pct = (audioEl.currentTime / audioEl.duration * 100).toFixed(1);
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = pct + '%';
  const cur = document.getElementById('time-current');
  if (cur) cur.textContent = formatTime(audioEl.currentTime);
  const tot = document.getElementById('time-total');
  if (tot) tot.textContent = formatTime(audioEl.duration);
}

function seekAudio(e) {
  if (!audioEl || !audioEl.duration) return;
  const track = e.currentTarget.querySelector('.progress-track');
  const rect = track.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.currentTime = pct * audioEl.duration;
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  if (audioEl) audioEl.playbackRate = speeds[speedIdx];
  const btn = document.getElementById('speed-btn');
  if (btn) btn.textContent = speeds[speedIdx] + 'x';
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// ── Institution mini audio (on-demand generation)
async function generateInstAudio(idx) {
  const inst = currentData?.institutions?.[idx];
  if (!inst) return;

  const btn = document.getElementById(`gen-btn-${idx}`);
  const label = document.getElementById(`mini-label-${idx}`);
  if (!btn || !label) return;

  btn.disabled = true;
  btn.textContent = lang === 'en' ? 'Generating...' : '생성 중...';
  label.textContent = lang === 'en' ? 'Creating audio summary...' : '오디오 요약 생성 중...';

  // NOTE: 실제 on-demand TTS는 서버가 필요해요.
  // GitHub Pages는 정적이라 여기선 안내 메시지를 보여줘요.
  setTimeout(() => {
    label.textContent = lang === 'en'
      ? 'On-demand audio requires a server. See README.'
      : '실시간 생성은 서버가 필요해요. README를 확인하세요.';
    btn.textContent = lang === 'en' ? 'Learn more' : '자세히';
    btn.disabled = false;
    btn.onclick = () => window.open('https://github.com', '_blank');
  }, 1500);
}

function toggleMiniPlay(idx) {}

init();
</script>
</body>
</html>
